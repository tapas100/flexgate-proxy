# benchmarks/targets/nginx.conf
#
# Nginx comparison target — Scenario 1
#
# This is a MINIMAL, FAIR comparison config.
# It does only what HAProxy bench cfg does: forward requests to the echo server.
# No caching, no SSL, no extra modules — pure forwarding overhead.
#
# Run (assuming nginx installed):
#   nginx -c $(pwd)/benchmarks/targets/nginx.conf -p $(pwd)/benchmarks/targets
#
# Or via podman-compose.yml in this directory.

worker_processes      auto;          # one per logical core
worker_rlimit_nofile  65535;

error_log  /dev/null  crit;          # silence logs during benchmark
pid        /tmp/nginx-bench.pid;

events {
    worker_connections  4096;
    use                 kqueue;      # macOS; change to epoll on Linux
    multi_accept        on;
}

http {
    # ── Upstream ───────────────────────────────────────────────────────────────
    upstream echo_backend {
        server 127.0.0.1:9000;
        keepalive 256;               # connection pool — mirrors HAProxy maxconn
    }

    # ── Server — Scenario 1 listener ──────────────────────────────────────────
    server {
        listen      9001 reuseport;
        server_name localhost;

        access_log  off;             # no I/O during benchmark
        error_log   /dev/null;

        # Timeouts aligned with haproxy-bench.cfg
        proxy_connect_timeout  5s;
        proxy_send_timeout     10s;
        proxy_read_timeout     10s;

        # Use HTTP/1.1 keepalive to upstream
        proxy_http_version     1.1;
        proxy_set_header       Connection "";

        # Forward client IP (same as HAProxy forwardfor)
        proxy_set_header       X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header       X-Real-IP        $remote_addr;
        proxy_set_header       Host             $host;

        # ── Health probe (used by k6 setup()) ──────────────────────────────
        location /health {
            proxy_pass  http://echo_backend/health;
        }

        # ── Benchmark endpoint ─────────────────────────────────────────────
        location /bench {
            proxy_pass  http://echo_backend/bench;
        }

        # Block everything else — misconfiguration guard
        location / {
            return 404 '{"error":"not found"}';
            add_header Content-Type application/json;
        }
    }
}
