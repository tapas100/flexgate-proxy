# benchmarks/targets/haproxy-bench.cfg
#
# HAProxy benchmark configuration — Scenarios 2, 3, 4, 5
#
# IMPORTANT: This is a STRIPPED benchmark config, NOT the production config.
# Rate limiting, circuit breaker, CORS, and security headers have been
# removed so we measure pure forwarding overhead only.
# Production config lives at haproxy/haproxy.cfg.
#
# Topology served by this config:
#
#   Scenario 2 — HAProxy only:
#     :9002  →  echo server (:9000)
#
#   Scenario 3 — FlexGate inline:
#     :9003  →  FlexGate (:8080)  →  echo server (:9000)
#
#   Scenario 4 — FlexGate mirror:
#     :9004  →  echo server (:9000)   [critical path]
#              └─ mirror ──►  FlexGate (:8080)  [async shadow]
#
#   Scenario 5 — Realistic traffic (Stage 2):
#     :9006  →  FlexGate (:8080)  →  echo (:9000 fast / :9007 slow)
#     /bench/slow routes to the 50 ms-latency echo instance
#
# Run:
#   haproxy -f benchmarks/targets/haproxy-bench.cfg

global
    maxconn         50000
    nbthread        4                # match production haproxy.cfg
    log             stdout format raw local0 info
    tune.ssl.default-dh-param 2048

defaults
    mode            http
    log             global
    timeout connect 5s
    timeout client  30s
    timeout server  30s
    timeout http-request   10s
    timeout http-keep-alive 10s
    option          httplog
    option          dontlognull
    option          http-server-close
    option          forwardfor except 127.0.0.0/8

# ── Stats — scraped by collect-metrics.sh ────────────────────────────────────
listen stats_bench
    bind *:9005
    stats enable
    stats uri /stats
    stats refresh 1s
    stats show-legends
    stats show-node
    stats auth bench:bench

# ── Scenario 2 — HAProxy only ────────────────────────────────────────────────
frontend bench_haproxy
    bind *:9002

    # Request ID for tracing (same as production)
    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%rt:%pid
    unique-id-header X-Request-ID

    default_backend echo_backend

# ── Scenario 3 — FlexGate inline ─────────────────────────────────────────────
frontend bench_flexgate_inline
    bind *:9003

    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%rt:%pid
    unique-id-header X-Request-ID

    default_backend flexgate_inline_backend

# ── Scenario 4 — FlexGate mirror ─────────────────────────────────────────────
# Note: HAProxy 3.x removed `http-request mirror`.
# The flexgate-mirror scenario targets FlexGate directly on :8081
# (started by start.sh), so this frontend is kept as a simple passthrough
# to the echo backend for any auxiliary tooling that still hits :9004.
frontend bench_flexgate_mirror
    bind *:9004

    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%rt:%pid
    unique-id-header X-Request-ID

    default_backend echo_backend

# ── Backend: echo server ──────────────────────────────────────────────────────
backend echo_backend
    balance         roundrobin
    option          httpchk
    http-check      send meth GET uri /health hdr Host localhost
    http-check      expect status 200
    server          echo1 127.0.0.1:9000 check inter 2s rise 2 fall 3 maxconn 1000

# ── Scenario 5 — Realistic traffic (Stage 2) ─────────────────────────────────
frontend bench_realistic
    bind *:9006

    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%rt:%pid
    unique-id-header X-Request-ID

    default_backend flexgate_inline_backend

# ── Backend: FlexGate inline ──────────────────────────────────────────────────
backend flexgate_inline_backend
    balance         roundrobin
    option          httpchk
    http-check      send meth GET uri /health hdr Host localhost
    http-check      expect status 200
    # FlexGate's proxy port — it in turn forwards to echo server
    server          flexgate1 127.0.0.1:8080 check inter 2s rise 2 fall 3 maxconn 1000
