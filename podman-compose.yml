# Podman Compose for HAProxy + FlexGate (Go)
# High-performance setup for >10K req/sec
#
# Run with: podman-compose up -d
# Or use Makefile: make start
version: '3.8'

services:

  # ── HAProxy — high-performance data plane ───────────────────────────────────
  haproxy:
    image: haproxy:2.8-alpine
    container_name: flexgate-haproxy
    ports:
      - "8080:8080"
      - "8443:8443"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
      - ./haproxy/errors:/etc/haproxy/errors:ro
      - ./haproxy/certs:/etc/haproxy/certs:ro
    networks:
      - flexgate-network
    depends_on:
      - flexgate-app-1
      - flexgate-app-2
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "haproxy", "-c", "-f", "/usr/local/etc/haproxy/haproxy.cfg"]
      interval: 10s
      timeout: 5s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '1'
          memory: 512M

  # ── FlexGate Go proxy — instance 1 (port 8080) ──────────────────────────────
  flexgate-app-1:
    image: localhost/flexgate-proxy:latest
    container_name: flexgate-app-1
    environment:
      - FLEXGATE_PROXY_PORT=8080
      - FLEXGATE_PROXY_ADMIN_PORT=9090
      - FLEXGATE_STORE_POSTGRES_URL=postgres://flexgate:flexgate@postgres:5432/flexgate?sslmode=disable
      - FLEXGATE_STORE_REDIS_URL=redis://redis:6379
      - FLEXGATE_LOGGING_LEVEL=info
      - FLEXGATE_LOGGING_FORMAT=json
    networks:
      - flexgate-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["/flexgate-proxy", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── FlexGate Go proxy — instance 2 (port 8081) ──────────────────────────────
  flexgate-app-2:
    image: localhost/flexgate-proxy:latest
    container_name: flexgate-app-2
    environment:
      - FLEXGATE_PROXY_PORT=8081
      - FLEXGATE_PROXY_ADMIN_PORT=9091
      - FLEXGATE_STORE_POSTGRES_URL=postgres://flexgate:flexgate@postgres:5432/flexgate?sslmode=disable
      - FLEXGATE_STORE_REDIS_URL=redis://redis:6379
      - FLEXGATE_LOGGING_LEVEL=info
      - FLEXGATE_LOGGING_FORMAT=json
    networks:
      - flexgate-network
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    healthcheck:
      test: ["/flexgate-proxy", "healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── PostgreSQL — route + config store ───────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: flexgate-postgres
    environment:
      - POSTGRES_DB=flexgate
      - POSTGRES_USER=flexgate
      - POSTGRES_PASSWORD=flexgate
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - flexgate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flexgate"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ── Redis — rate-limit + cache store ────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: flexgate-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - flexgate-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  # ── Prometheus — metrics scraping ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: flexgate-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - flexgate-network
    restart: unless-stopped

  # ── Admin UI — React management dashboard (nginx) ───────────────────────────
  admin-ui:
    image: localhost/flexgate-admin-ui:latest
    container_name: flexgate-admin-ui
    ports:
      - "3002:3000"
    networks:
      - flexgate-network
    depends_on:
      - haproxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  flexgate-network:
    driver: bridge

volumes:
  postgres-data:
  prometheus-data:
