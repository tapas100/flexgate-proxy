# HAProxy Configuration for FlexGate Proxy
# Optimized for >10K req/sec with rate limiting and circuit breaker

global
    # Performance tuning
    maxconn 50000
    nbthread 4  # Adjust based on CPU cores (nbproc deprecated in HAProxy 2.5+)
    
    # Logging
    log stdout format raw local0 info
    
    # Stats socket for runtime API (disabled in container for simplicity)
    # stats socket /var/run/haproxy.sock mode 600 level admin expose-fd listeners
    # stats timeout 2m
    
    # Security
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    mode http
    log global
    
    # Timeouts
    timeout connect 5s
    timeout client 30s
    timeout server 30s
    timeout http-request 10s
    timeout http-keep-alive 10s
    
    # Error handling
    option httplog
    option dontlognull
    option http-server-close
    option forwardfor except 127.0.0.0/8
    
    # Health checks
    option httpchk
    
    # Compression
    compression algo gzip
    compression type text/html text/plain text/css application/json application/javascript

# Frontend - API Gateway Entry Point
frontend api_gateway
    bind *:8080
    # HTTPS disabled until SSL cert is available
    # bind *:8443 ssl crt /etc/haproxy/certs/cert.pem
    
    # Request ID for tracing
    unique-id-format %{+X}o\ %ci:%cp_%fi:%fp_%Ts_%rt:%pid
    unique-id-header X-Request-ID
    
    # Rate Limiting - Stick Table
    # Track IP addresses, store request rate
    stick-table type ip size 100k expire 30s store http_req_rate(10s),http_err_rate(10s)
    
    # Track requests per IP
    http-request track-sc0 src
    
    # Deny if more than 1000 requests per 10 seconds per IP (10K req/sec total / 10 IPs avg)
    acl rate_abuse sc_http_req_rate(0) gt 1000
    http-request deny deny_status 429 if rate_abuse
    
    # Deny if error rate > 50% (circuit breaker at client level)
    acl too_many_errors sc_http_err_rate(0) gt 50
    http-request deny deny_status 503 if too_many_errors
    
    # Custom rate limit header
    http-response set-header X-RateLimit-Limit 1000
    http-response set-header X-RateLimit-Remaining %[sc_http_req_rate(0),sub(1000)]
    http-response set-header X-RateLimit-Reset %[date(),add(10),http_date]
    
    # CORS headers
    http-response set-header Access-Control-Allow-Origin "*"
    http-response set-header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS"
    http-response set-header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID"
    
    # Security headers
    http-response set-header X-Content-Type-Options nosniff
    http-response set-header X-Frame-Options DENY
    http-response set-header X-XSS-Protection "1; mode=block"
    
    # Routing rules
    acl is_api path_beg /api/
    acl is_admin path_beg /admin
    acl is_metrics path /metrics
    acl is_health path /health
    acl is_webhook path_beg /webhooks/
    
    # Route to appropriate backends
    use_backend backend_api if is_api
    use_backend backend_admin if is_admin
    use_backend backend_metrics if is_metrics
    use_backend backend_health if is_health
    use_backend backend_webhooks if is_webhook
    
    # Default backend
    default_backend backend_api

# Backend - API Services (with Circuit Breaker)
backend backend_api
    balance roundrobin
    
    # Health check configuration (Circuit Breaker) - Updated for HAProxy 2.8
    option httpchk
    http-check send meth GET uri /health hdr Host localhost
    http-check expect status 200
    
    # Circuit Breaker settings:
    # - check every 2 seconds
    # - 2 successful checks to mark UP (rise)
    # - 3 failed checks to mark DOWN (fall)
    # - max 1000 concurrent connections per server
    # - if server fails, retry after 10s
    
    server api1 flexgate-app-1:3000 check inter 2s rise 2 fall 3 maxconn 1000 weight 100
    server api2 flexgate-app-2:3000 check inter 2s rise 2 fall 3 maxconn 1000 weight 100
    # Add more servers as needed
    
    # Retry logic (part of circuit breaker)
    retry-on all-retryable-errors
    retries 3
    
    # Server timeout (fail fast)
    timeout server 5s
    
    # Custom error pages
    errorfile 503 /etc/haproxy/errors/503.http

# Backend - Admin UI
backend backend_admin
    balance roundrobin
    server admin1 flexgate-app-1:3000 check inter 5s rise 2 fall 3

# Backend - Metrics (Prometheus)
backend backend_metrics
    server metrics1 flexgate-app-1:3000 check

# Backend - Health Check
backend backend_health
    server health1 flexgate-app-1:3000 check

# Backend - Webhooks (may need higher timeouts)
backend backend_webhooks
    balance roundrobin
    timeout server 60s  # Webhooks may take longer
    server webhook1 flexgate-app-1:3000 check inter 5s rise 2 fall 3

# Stats Page (for monitoring)
listen stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats show-legends
    stats show-node
    
    # Authentication (change in production!)
    stats auth admin:changeme
    
    # Real-time stats API
    stats admin if TRUE
