global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'proxy-cluster'
    environment: 'development'

scrape_configs:
  - job_name: 'flexgate-api'
    static_configs:
      - targets: ['localhost:3000']
        labels:
          service: 'flexgate-api'
    
    metrics_path: /prometheus-metrics
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'haproxy'
    static_configs:
      - targets: ['localhost:8404']
        labels:
          service: 'haproxy-stats'
    
    metrics_path: /stats
    scrape_interval: 10s
    scrape_timeout: 5s

# Note: Redis metrics require redis_exporter
# Install with: brew install redis_exporter
# Then uncomment:
# - job_name: 'redis'
#   static_configs:
#     - targets: ['localhost:9121']
#       labels:
#         service: 'redis'
