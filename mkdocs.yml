site_name: FlexGate Proxy
site_description: Production-grade AI-native API gateway with built-in observability, security, and reliability
site_url: https://tapas100.github.io/flexgate-proxy
site_author: tapas100
repo_name: tapas100/flexgate-proxy
repo_url: https://github.com/tapas100/flexgate-proxy
edit_uri: edit/main/docs/
docs_dir: docs
site_dir: site

# Theme — Material (Google developer docs look)
theme:
  name: material
  # logo: assets/logo.png      # add a 200x200 PNG here to enable
  # favicon: assets/favicon.png
  palette:
    # Light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    # Dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.tabs               # Top-level tabs like Google docs
    - navigation.tabs.sticky        # Tabs stay visible on scroll
    - navigation.sections           # Grouped sidebar sections
    - navigation.expand             # Auto-expand active section
    - navigation.path               # Breadcrumbs
    - navigation.top                # Back to top button
    - navigation.indexes            # Section index pages
    - search.highlight              # Highlight search terms in results
    - search.suggest                # Search suggestions
    - search.share                  # Shareable search URLs
    - content.code.copy             # Copy button on all code blocks
    - content.code.annotate         # Code annotations
    - content.tooltips              # Inline tooltips
    - toc.follow                    # TOC auto-scrolls with page

# Plugins
plugins:
  - search:
      lang: en
  - minify:
      minify_html: true

# Extensions — full Markdown power
markdown_extensions:
  - admonition                      # !!! note, warning, tip, etc.
  - pymdownx.details                # Collapsible blocks
  - pymdownx.superfences:           # Code blocks with syntax highlight
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ['.']              # lets --8<-- "CHANGELOG.md" resolve from repo root
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - tables
  - toc:
      permalink: true               # Anchor links on all headings
      title: On this page

# Extra — social links + analytics ready
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/tapas100/flexgate-proxy
    - icon: fontawesome/brands/npm
      link: https://www.npmjs.com/package/flexgate-proxy
  analytics:
    provider: google
    property: !ENV [GOOGLE_ANALYTICS_KEY, ""]

extra_css:
  - stylesheets/extra.css

# Navigation — structured like Google developer docs
nav:
  - Home: index.md

  - Getting Started:
    - getting-started/index.md
    - Quick Start: getting-started/quickstart.md
    - Installation: getting-started/installation.md
    - Configuration: getting-started/configuration.md

  - Guides:
    - guides/index.md
    - Route Management: features/02-route-management.md
    - Webhooks: features/07-webhooks.md
    - Admin UI: features/01-admin-ui.md
    - Observability: observability.md
    - Traffic Control: traffic-control.md

  - AI Features:
    - ai/index.md
    - Use Cases: ai/use-cases.md
    - Incident Response Playbook: ai/playbooks/incident-response.md
    - Auto-Recovery Playbook: ai/playbooks/auto-recovery.md
    - Cost Optimization: ai/playbooks/cost-optimization.md
    - Testing Guide: ai/TESTING_GUIDE.md

  - API Reference:
    - api/index.md
    - REST API: api.md

  - Architecture:
    - architecture/index.md
    - Overview: architecture.md
    - Threat Model: threat-model.md
    - Trade-offs: trade-offs.md
    - TypeScript Migration: typescript-migration.md

  - Deployment:
    - deployment/index.md
    - Quick Start: deployment/quick-start.md
    - AWS EC2: deployment/aws-ec2.md
    - Cloud Comparison: deployment/cloud-comparison.md

  - CLI Reference:
    - cli/index.md

  - Contributing:
    - contributing/index.md
    - Changelog: changelog.md
